name: UBuilder Cross-Platform CI

on:
  push:
    branches: [main, develop, tests]
  pull_request:
    branches: [main, tests]
  workflow_dispatch: # Allow manual triggering

env:
  CMAKE_BUILD_TYPE: Release

permissions:
  contents: read # Required to checkout code
  actions: write # Required to upload artifacts

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: "Ubuntu Latest"
            os: ubuntu-latest
          - name: "Ubuntu 20.04"
            os: ubuntu-20.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential zlib1g-dev

      - name: Install runtime dependencies
        run: |
          sudo apt-get install -y php-cli php-dev python3 python3-dev nodejs npm
          # Verify installations
          php --version
          python3 --version
          node --version

      - name: Make build scripts executable
        run: |
          chmod +x build-all.sh
          chmod +x examples/build-examples*.sh
          chmod +x examples/build-examples.sh

      - name: Run cross-platform build system
        run: |
          ./build-all.sh

      - name: Remove runtime dependencies and test portability
        run: |
          echo "=== Removing runtime dependencies to test portability ==="

          # Try to remove packages with force and ignore dependencies
          echo "Attempting to remove runtimes with --ignore-dependencies..."
          sudo apt-get remove -y --ignore-depends --force-yes php-cli php-dev python3 python3-dev nodejs npm 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true

          # Alternative approach: Remove from PATH by manipulating environment
          echo "Removing runtimes from PATH as fallback..."
          export PATH=$(echo $PATH | tr ':' '\n' | grep -v -E '(php|python|node|npm)' | tr '\n' ':')

          # Create dummy executables that exit with error to simulate missing runtimes
          sudo mkdir -p /tmp/fake-bin
          echo '#!/bin/bash' | sudo tee /tmp/fake-bin/php > /dev/null
          echo 'echo "php: command not found"; exit 127' | sudo tee -a /tmp/fake-bin/php > /dev/null
          echo '#!/bin/bash' | sudo tee /tmp/fake-bin/python3 > /dev/null
          echo 'echo "python3: command not found"; exit 127' | sudo tee -a /tmp/fake-bin/python3 > /dev/null
          echo '#!/bin/bash' | sudo tee /tmp/fake-bin/node > /dev/null
          echo 'echo "node: command not found"; exit 127' | sudo tee -a /tmp/fake-bin/node > /dev/null
          sudo chmod +x /tmp/fake-bin/*

          # Prepend fake-bin to PATH to override system executables
          export PATH="/tmp/fake-bin:$PATH"

          echo "=== Verifying runtimes are removed/blocked ==="
          if command -v php >/dev/null 2>&1 && php --version >/dev/null 2>&1; then
            echo "⚠ PHP still available and working"
          else
            echo "✓ PHP successfully removed or blocked"
          fi

          if command -v python3 >/dev/null 2>&1 && python3 --version >/dev/null 2>&1; then
            echo "⚠ Python3 still available and working"
          else
            echo "✓ Python3 successfully removed or blocked"
          fi

          if command -v node >/dev/null 2>&1 && node --version >/dev/null 2>&1; then
            echo "⚠ Node.js still available and working"
          else
            echo "✓ Node.js successfully removed or blocked"
          fi

          echo "=== Testing Portable Executables (No System Runtimes) ==="

          if [ -f "examples/output/nodejs" ]; then
            echo "Testing Node.js executable..."
            timeout 30s ./examples/output/nodejs || echo "Node.js test completed with exit code $?"
          else
            echo "⚠ Node.js executable not found"
          fi

          if [ -f "examples/output/php" ]; then
            echo "Testing PHP executable..."
            timeout 30s ./examples/output/php || echo "PHP test completed with exit code $?"
          else
            echo "⚠ PHP executable not found"
          fi

          if [ -f "examples/output/python" ]; then
            echo "Testing Python executable..."
            timeout 30s ./examples/output/python || echo "Python test completed with exit code $?"
          else
            echo "⚠ Python executable not found"
          fi

          echo "=== Portability Test Complete ==="

      - name: Verify build outputs
        run: |
          echo "=== Build Output Verification ==="
          ls -la build/src/
          ls -la examples/output/ || echo "No example outputs found"

          echo "=== Testing UBuilder executable ==="
          ./build/src/ubuilder --version
          ./build/src/ubuilder --help

      - name: Run unit tests
        run: |
          cd build
          if [ -f "./tests/test_ubuilder" ]; then
            echo "Running unit tests..."
            ./tests/test_ubuilder
          else
            echo "Unit tests not found, skipping..."
          fi

      - name: Test individual platform script
        run: |
          echo "=== Testing Linux-specific script ==="
          ./examples/build-examples-linux.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-linux-${{ matrix.os }}
          path: |
            build/src/ubuilder
            examples/output/
          retention-days: 7
          if-no-files-found: warn
          compression-level: 6

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-linux-${{ matrix.os }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 3

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      matrix:
        shell: [powershell] # Temporarily disabled cmd due to Unicode/timeout issues
        # shell: [cmd, powershell]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v1.1

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install runtime dependencies
        shell: pwsh
        run: |
          Write-Host "Installing dependencies..." -ForegroundColor Cyan

          # Function to safely run commands
          function Invoke-SafeCommand {
            param([string]$Command, [array]$Args, [string]$Name)
            try {
              $output = & $Command @Args 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "✓ $Name installed/updated successfully" -ForegroundColor Green
              } else {
                Write-Host "⚠ $Name returned exit code $LASTEXITCODE (may already be installed)" -ForegroundColor Yellow
              }
            } catch {
              Write-Host "⚠ $Name installation failed or already installed: $_" -ForegroundColor Yellow
            }
          }

          # Install via winget with better error handling
          Invoke-SafeCommand "winget" @("install", "--id", "Microsoft.VisualStudio.2022.BuildTools", "--silent", "--accept-package-agreements", "--accept-source-agreements") "Visual Studio Build Tools"
          Invoke-SafeCommand "winget" @("install", "--id", "Kitware.CMake", "--silent", "--accept-package-agreements", "--accept-source-agreements") "CMake"  
          Invoke-SafeCommand "winget" @("install", "--id", "Python.Python.3.11", "--silent", "--accept-package-agreements", "--accept-source-agreements") "Python 3.11"
          Invoke-SafeCommand "winget" @("install", "--id", "OpenJS.NodeJS", "--silent", "--accept-package-agreements", "--accept-source-agreements") "Node.js"

          # Install PHP using Chocolatey as backup  
          Write-Host "Checking for PHP..." -ForegroundColor Cyan
          if (-not (Get-Command php -ErrorAction SilentlyContinue)) {
            Write-Host "Installing PHP via Chocolatey..." -ForegroundColor Yellow
            try {
              Set-ExecutionPolicy Bypass -Scope Process -Force
              [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
              iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
              choco install php -y --force
              Write-Host "✓ PHP installed via Chocolatey" -ForegroundColor Green
            } catch {
              Write-Host "⚠ Failed to install PHP via Chocolatey: $_" -ForegroundColor Yellow
            }
          } else {
            Write-Host "✓ PHP already available" -ForegroundColor Green
          }

          # Refresh environment
          Write-Host "Refreshing environment..." -ForegroundColor Cyan
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")

          Write-Host "Dependencies installation completed!" -ForegroundColor Green

      - name: Verify runtime installations
        shell: pwsh
        run: |
          Write-Host "=== Runtime Verification ===" -ForegroundColor Cyan

          function Test-Runtime {
            param([string]$Command, [string]$Name, [array]$VersionArgs = @("--version"))
            Write-Host "Testing $Name..." -ForegroundColor Yellow
            try {
              $version = & $Command @VersionArgs 2>&1 | Select-Object -First 1
              Write-Host "✓ $Name available: $version" -ForegroundColor Green
              return $true
            } catch {
              Write-Host "✗ $Name not found or not working" -ForegroundColor Red
              return $false
            }
          }

          $results = @{}
          $results.Python = Test-Runtime "python" "Python"
          if (-not $results.Python) {
            $results.Python = Test-Runtime "python3" "Python3"
          }
          $results.NodeJS = Test-Runtime "node" "Node.js"
          $results.PHP = Test-Runtime "php" "PHP"
          $results.CMake = Test-Runtime "cmake" "CMake"

          Write-Host "`n=== Installation Summary ===" -ForegroundColor Cyan
          $results.GetEnumerator() | ForEach-Object {
            $status = if ($_.Value) { "✓" } else { "✗" }
            $color = if ($_.Value) { "Green" } else { "Red" }
            Write-Host "$($_.Key): $status" -ForegroundColor $color
          }

          $totalSuccess = ($results.Values | Where-Object { $_ }).Count
          Write-Host "`nSuccessfully verified: $totalSuccess/4 runtimes" -ForegroundColor $(if ($totalSuccess -ge 3) { "Green" } else { "Yellow" })

      - name: Run Windows Batch Build Script
        if: matrix.shell == 'cmd'
        shell: cmd
        timeout-minutes: 45
        run: |
          echo === Running Windows Batch Build Script ===
          examples\build-examples.bat

      - name: Run Windows PowerShell Build Script
        if: matrix.shell == 'powershell'
        shell: pwsh
        timeout-minutes: 45
        run: |
          Write-Host "=== Running Windows PowerShell Build Script ===" -ForegroundColor Cyan
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          examples\build-examples.ps1 -Verbose

      - name: Remove runtime dependencies for portability test
        shell: pwsh
        run: |
          Write-Host "=== Removing runtime dependencies to test portability ===" -ForegroundColor Cyan

          # Function to safely uninstall
          function Remove-Runtime {
            param([string]$Name, [string]$WingetId)
            try {
              Write-Host "Removing $Name..." -ForegroundColor Yellow
              winget uninstall --id $WingetId --silent --accept-source-agreements 2>$null
              Write-Host "✓ $Name removal attempted" -ForegroundColor Green
            } catch {
              Write-Host "⚠ $Name removal failed or not found: $_" -ForegroundColor Yellow
            }
          }

          # Remove runtimes
          Remove-Runtime "Python" "Python.Python.3.11"
          Remove-Runtime "Node.js" "OpenJS.NodeJS"

          # Remove PHP (if installed via Chocolatey)
          try {
            choco uninstall php -y --force 2>$null
            Write-Host "✓ PHP removal attempted" -ForegroundColor Green
          } catch {
            Write-Host "⚠ PHP removal failed or not found" -ForegroundColor Yellow
          }

          # Refresh environment
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")

          Write-Host "=== Verifying runtimes are removed ===" -ForegroundColor Cyan

          $runtimesRemoved = 0
          $totalRuntimes = 3

          if (-not (Get-Command php -ErrorAction SilentlyContinue)) {
            Write-Host "✓ PHP successfully removed" -ForegroundColor Green
            $runtimesRemoved++
          } else {
            Write-Host "⚠ PHP still available" -ForegroundColor Yellow
          }

          if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
            Write-Host "✓ Python successfully removed" -ForegroundColor Green
            $runtimesRemoved++
          } else {
            Write-Host "⚠ Python still available" -ForegroundColor Yellow
          }

          if (-not (Get-Command node -ErrorAction SilentlyContinue)) {
            Write-Host "✓ Node.js successfully removed" -ForegroundColor Green
            $runtimesRemoved++
          } else {
            Write-Host "⚠ Node.js still available" -ForegroundColor Yellow
          }

          Write-Host "Runtimes removed: $runtimesRemoved/$totalRuntimes" -ForegroundColor $(if ($runtimesRemoved -eq $totalRuntimes) { "Green" } else { "Yellow" })

      - name: Test portable executables
        shell: pwsh
        run: |
          Write-Host "=== Testing Portable Executables (No System Runtimes) ===" -ForegroundColor Cyan

          $exeTests = @()

          # Test Node.js executable
          $nodeExe = "examples\output\nodejs.exe"
          if (Test-Path $nodeExe) {
            Write-Host "Testing Node.js executable..." -ForegroundColor Yellow
            try {
              $process = Start-Process -FilePath $nodeExe -Wait -PassThru -WindowStyle Hidden -RedirectStandardOutput "nodejs_output.txt" -RedirectStandardError "nodejs_error.txt"
              $exitCode = $process.ExitCode
              Write-Host "Node.js test completed with exit code: $exitCode" -ForegroundColor $(if ($exitCode -eq 0) { "Green" } else { "Yellow" })
              $exeTests += "Node.js: $exitCode"
            } catch {
              Write-Host "Node.js test failed: $_" -ForegroundColor Red
              $exeTests += "Node.js: Failed"
            }
          } else {
            Write-Host "⚠ Node.js executable not found at $nodeExe" -ForegroundColor Yellow
            $exeTests += "Node.js: Not Found"
          }

          # Test PHP executable
          $phpExe = "examples\output\php.exe"
          if (Test-Path $phpExe) {
            Write-Host "Testing PHP executable..." -ForegroundColor Yellow
            try {
              $process = Start-Process -FilePath $phpExe -Wait -PassThru -WindowStyle Hidden -RedirectStandardOutput "php_output.txt" -RedirectStandardError "php_error.txt"
              $exitCode = $process.ExitCode
              Write-Host "PHP test completed with exit code: $exitCode" -ForegroundColor $(if ($exitCode -eq 0) { "Green" } else { "Yellow" })
              $exeTests += "PHP: $exitCode"
            } catch {
              Write-Host "PHP test failed: $_" -ForegroundColor Red
              $exeTests += "PHP: Failed"
            }
          } else {
            Write-Host "⚠ PHP executable not found at $phpExe" -ForegroundColor Yellow
            $exeTests += "PHP: Not Found"
          }

          # Test Python executable
          $pythonExe = "examples\output\python.exe"
          if (Test-Path $pythonExe) {
            Write-Host "Testing Python executable..." -ForegroundColor Yellow
            try {
              $process = Start-Process -FilePath $pythonExe -Wait -PassThru -WindowStyle Hidden -RedirectStandardOutput "python_output.txt" -RedirectStandardError "python_error.txt"
              $exitCode = $process.ExitCode
              Write-Host "Python test completed with exit code: $exitCode" -ForegroundColor $(if ($exitCode -eq 0) { "Green" } else { "Yellow" })
              $exeTests += "Python: $exitCode"
            } catch {
              Write-Host "Python test failed: $_" -ForegroundColor Red
              $exeTests += "Python: Failed"
            }
          } else {
            Write-Host "⚠ Python executable not found at $pythonExe" -ForegroundColor Yellow
            $exeTests += "Python: Not Found"
          }

          Write-Host "`n=== Portability Test Summary ===" -ForegroundColor Cyan
          $exeTests | ForEach-Object { Write-Host "  $_" -ForegroundColor White }
          Write-Host "=== Portability Test Complete ===" -ForegroundColor Cyan

      - name: Verify build outputs
        shell: pwsh
        run: |
          Write-Host "=== Build Output Verification ===" -ForegroundColor Cyan

          # Check for UBuilder executable
          $ubuilderPath = $null
          if (Test-Path "build\src\Release\ubuilder.exe") {
            $ubuilderPath = "build\src\Release\ubuilder.exe"
            Write-Host "Found: $ubuilderPath" -ForegroundColor Green
          } elseif (Test-Path "build\src\ubuilder.exe") {
            $ubuilderPath = "build\src\ubuilder.exe"
            Write-Host "Found: $ubuilderPath" -ForegroundColor Green
          } else {
            Write-Host "UBuilder executable not found!" -ForegroundColor Red
            Write-Host "Searching for ubuilder files..." -ForegroundColor Yellow
            Get-ChildItem -Recurse -Name "ubuilder*" | ForEach-Object { Write-Host "  $_" }
            exit 1
          }

          # Test UBuilder executable
          Write-Host "`nTesting UBuilder executable..." -ForegroundColor Yellow
          try {
            & $ubuilderPath --version
            if ($LASTEXITCODE -eq 0) {
              Write-Host "UBuilder version check successful!" -ForegroundColor Green
            } else {
              Write-Host "UBuilder version check failed with exit code $LASTEXITCODE" -ForegroundColor Red
            }
          } catch {
            Write-Host "Failed to run UBuilder: $_" -ForegroundColor Red
          }

          # Check example outputs
          Write-Host "`n=== Example Outputs ===" -ForegroundColor Cyan
          if (Test-Path "examples\output") {
            $examples = Get-ChildItem "examples\output" -File
            if ($examples.Count -gt 0) {
              Write-Host "Found $($examples.Count) example executable(s):" -ForegroundColor Green
              $examples | ForEach-Object { Write-Host "  $_" -ForegroundColor Green }
            } else {
              Write-Host "No example executables found in examples\output" -ForegroundColor Yellow
            }
          } else {
            Write-Host "examples\output directory not found" -ForegroundColor Yellow
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-windows-${{ matrix.shell }}
          path: |
            build/src/Release/ubuilder.exe
            build/src/ubuilder.exe
            examples/output/
          retention-days: 7
          if-no-files-found: warn
          compression-level: 6

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows-${{ matrix.shell }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 3

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - name: "macOS Latest"
            os: macos-latest
          - name: "macOS 12"
            os: macos-12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew update
          brew install cmake zlib

      - name: Install runtime dependencies
        run: |
          brew install php python3 node
          # Verify installations
          php --version
          python3 --version
          node --version

      - name: Make build scripts executable
        run: |
          chmod +x build-all.sh
          chmod +x examples/build-examples*.sh

      - name: Run cross-platform build system
        run: |
          ./build-all.sh

      - name: Remove runtime dependencies and test portability
        run: |
          echo "=== Removing runtime dependencies to test portability ==="

          # Try to uninstall with ignore dependencies first
          echo "Attempting to remove runtimes with --ignore-dependencies..."
          brew uninstall --ignore-dependencies php python3 node 2>/dev/null || true

          # Alternative approach: Create fake executables to override system ones
          echo "Creating fake executables to simulate missing runtimes..."
          mkdir -p /tmp/fake-bin

          # Create fake PHP
          echo '#!/bin/bash' > /tmp/fake-bin/php
          echo 'echo "php: command not found"; exit 127' >> /tmp/fake-bin/php
          chmod +x /tmp/fake-bin/php

          # Create fake Python3
          echo '#!/bin/bash' > /tmp/fake-bin/python3
          echo 'echo "python3: command not found"; exit 127' >> /tmp/fake-bin/python3
          chmod +x /tmp/fake-bin/python3

          # Create fake Node
          echo '#!/bin/bash' > /tmp/fake-bin/node
          echo 'echo "node: command not found"; exit 127' >> /tmp/fake-bin/node
          chmod +x /tmp/fake-bin/node

          # Prepend fake-bin to PATH to override system executables
          export PATH="/tmp/fake-bin:$PATH"

          echo "=== Verifying runtimes are removed/blocked ==="
          if command -v php >/dev/null 2>&1 && php --version >/dev/null 2>&1; then
            echo "⚠ PHP still available and working"
          else
            echo "✓ PHP successfully removed or blocked"
          fi

          if command -v python3 >/dev/null 2>&1 && python3 --version >/dev/null 2>&1; then
            echo "⚠ Python3 still available and working"
          else
            echo "✓ Python3 successfully removed or blocked"
          fi

          if command -v node >/dev/null 2>&1 && node --version >/dev/null 2>&1; then
            echo "⚠ Node.js still available and working"
          else
            echo "✓ Node.js successfully removed or blocked"
          fi

          echo "=== Testing Portable Executables (No System Runtimes) ==="

          if [ -f "examples/output/nodejs" ]; then
            echo "Testing Node.js executable..."
            timeout 30s ./examples/output/nodejs || echo "Node.js test completed with exit code $?"
          else
            echo "⚠ Node.js executable not found"
          fi

          if [ -f "examples/output/php" ]; then
            echo "Testing PHP executable..."
            timeout 30s ./examples/output/php || echo "PHP test completed with exit code $?"
          else
            echo "⚠ PHP executable not found"
          fi

          if [ -f "examples/output/python" ]; then
            echo "Testing Python executable..."
            timeout 30s ./examples/output/python || echo "Python test completed with exit code $?"
          else
            echo "⚠ Python executable not found"
          fi

          echo "=== Portability Test Complete ==="

      - name: Verify build outputs
        run: |
          echo "=== Build Output Verification ==="
          ls -la build/src/
          ls -la examples/output/ || echo "No example outputs found"

          echo "=== Testing UBuilder executable ==="
          ./build/src/ubuilder --version
          ./build/src/ubuilder --help

      - name: Run unit tests
        run: |
          cd build
          if [ -f "./tests/test_ubuilder" ]; then
            echo "Running unit tests..."
            ./tests/test_ubuilder
          else
            echo "Unit tests not found, skipping..."
          fi

      - name: Test macOS-specific script
        run: |
          echo "=== Testing macOS-specific script ==="
          ./examples/build-examples-macos.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-macos-${{ matrix.os }}
          path: |
            build/src/ubuilder
            examples/output/
          retention-days: 7
          if-no-files-found: warn
          compression-level: 6

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-macos-${{ matrix.os }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 3

  # Cross-platform integration test
  integration-test:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display build results
        run: |
          echo "=== Cross-Platform Build Results ==="
          find artifacts -name "ubuilder*" -type f
          echo ""
          echo "=== Build Summary ==="
          echo "Linux builds:"
          find artifacts -name "*linux*" -type d || echo "No Linux builds found"
          echo "Windows builds:"
          find artifacts -name "*windows*" -type d || echo "No Windows builds found"
          echo "macOS builds:"
          find artifacts -name "*macos*" -type d || echo "No macOS builds found"

          echo ""
          echo "=== Example Applications ==="
          find artifacts -name "*.exe" -o -name "nodejs" -o -name "php" -o -name "python" | grep -v "/build/" || echo "No example applications found"

  # Create release artifacts
  release:
    needs: [integration-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release package
        run: |
          mkdir -p release

          # Copy executables
          find artifacts -name "ubuilder" -type f -exec cp {} release/ubuilder-linux \;
          find artifacts -name "ubuilder.exe" -type f -exec cp {} release/ubuilder-windows.exe \;
          find artifacts -name "ubuilder" -path "*/macos*" -type f -exec cp {} release/ubuilder-macos \;

          # Copy documentation
          cp README.md release/
          cp examples/BUILD_SYSTEM.md release/
          cp LICENSE release/ 2>/dev/null || echo "LICENSE file not found"

          # Create archive
          cd release
          tar -czf ../ubuilder-cross-platform.tar.gz *

          echo "=== Release Contents ==="
          ls -la

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-release
          path: |
            release/*
            ubuilder-cross-platform.tar.gz
          retention-days: 30
