name: UBuilder CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential zlib1g-dev
          sudo apt-get install -y php-cli php-dev php-mbstring python3 nodejs

      - name: Build UBuilder
        run: |
          chmod +x build-system/build.sh
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          if [ -f "./test_ubuilder" ]; then
            ./test_ubuilder
          else
            echo "Tests not built, skipping..."
          fi

      - name: Test basic functionality
        run: |
          cd build
          ./src/ubuilder --version
          ./src/ubuilder --help

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ubuilder-linux
          path: build/src/ubuilder

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          # Install PHP, Python, and Node.js for Windows
          choco install php python nodejs cmake

      - name: Build UBuilder
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release

      - name: Run tests
        run: |
          cd build
          if (Test-Path ".\Release\test_ubuilder.exe") {
            .\Release\test_ubuilder.exe
          } elseif (Test-Path ".\test_ubuilder.exe") {
            .\test_ubuilder.exe
          } else {
            Write-Host "Tests not built, skipping..."
          }

      - name: Test basic functionality
        run: |
          cd build
          if (Test-Path ".\src\Release\ubuilder.exe") {
            .\src\Release\ubuilder.exe --version
          } elseif (Test-Path ".\src\ubuilder.exe") {
            .\src\ubuilder.exe --version
          } else {
            Write-Host "UBuilder executable not found"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ubuilder-windows
          path: build\src\Release\ubuilder.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          brew install cmake zlib
          brew install php python3 node

      - name: Build UBuilder
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          cd build
          if [ -f "./test_ubuilder" ]; then
            ./test_ubuilder
          else
            echo "Tests not built, skipping..."
          fi

      - name: Test basic functionality
        run: |
          cd build
          ./src/ubuilder --version
          ./src/ubuilder --help

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ubuilder-macos
          path: build/src/ubuilder
