name: UBuilder CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential zlib1g-dev
          sudo apt-get install -y php-cli php-dev php-mbstring python3 nodejs

      - name: Build UBuilder
        run: |
          chmod +x build-system/build.sh
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          if [ -f "./test_ubuilder" ]; then
            ./test_ubuilder
          else
            echo "Tests not built, skipping..."
          fi

      - name: Test basic functionality
        run: |
          cd build
          ./src/ubuilder --version
          ./src/ubuilder --help

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-linux
          path: build/src/ubuilder

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Install PHP, Python, Node.js, CMake, and development tools for Windows
          choco install php python nodejs cmake
          # Install vcpkg for Windows dependencies
          git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg install zlib:x64-windows

      - name: Build UBuilder
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake ..
          cmake --build . --config Release

      - name: Run tests
        run: |
          cd build
          if (Test-Path ".\Release\test_ubuilder.exe") {
            .\Release\test_ubuilder.exe
          } elseif (Test-Path ".\test_ubuilder.exe") {
            .\test_ubuilder.exe
          } else {
            Write-Host "Tests not built, skipping..."
          }

      - name: Test basic functionality
        run: |
          cd build
          if (Test-Path ".\src\Release\ubuilder.exe") {
            $ubuilder = ".\src\Release\ubuilder.exe"
          } elseif (Test-Path ".\src\ubuilder.exe") {
            $ubuilder = ".\src\ubuilder.exe"
          } else {
            Write-Host "UBuilder executable not found"
            exit 1
          }

          # Test with a simple project first
          New-Item -ItemType Directory -Force -Path "test-project"
          Set-Content -Path "test-project\main.php" -Value '<?php echo "Hello from UBuilder!\n"; ?>'
          Set-Content -Path "test-project\ubuilder.json" -Value '{"entry": "main.php", "runtime": "php"}'

          # Test build functionality
          & $ubuilder --project-dir=test-project --runtime=php --output=test-app.exe
          if (Test-Path ".\test-app.exe") {
            Write-Host "Build successful!"
            # Try to run the test app
            try {
              & .\test-app.exe
            } catch {
              Write-Host "Test app execution failed, but build succeeded"
            }
          }

          # Test version and help
          & $ubuilder --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-windows
          path: |
            build/src/Release/ubuilder.exe
            build/src/ubuilder.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake zlib
          brew install php python3 node
          # Ensure PHP extensions are available
          brew install php@8.1

      - name: Build UBuilder
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          cd build
          if [ -f "./test_ubuilder" ]; then
            ./test_ubuilder
          else
            echo "Tests not built, skipping..."
          fi

      - name: Test basic functionality
        run: |
          cd build
          # Set proper runtime paths for macOS
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          export DYLD_LIBRARY_PATH="/opt/homebrew/lib:/usr/local/lib:$DYLD_LIBRARY_PATH"

          # Check what runtimes are available
          echo "Available runtimes:"
          which php || echo "PHP not found"
          which python3 || echo "Python3 not found"
          which node || echo "Node not found"

          # Test version and help first
          ./src/ubuilder --version
          ./src/ubuilder --help

          # Test with a simple PHP project
          mkdir -p test-project
          echo '<?php echo "Hello from UBuilder!\n"; ?>' > test-project/main.php
          echo '{"entry": "main.php", "runtime": "php"}' > test-project/ubuilder.json

          echo "Building test app..."
          ./src/ubuilder --project-dir=test-project --runtime=php --output=test-app

          if [ -f "./test-app" ]; then
            echo "Test app built successfully, attempting to run..."
            # Try to run with timeout and better error handling
            timeout 30s ./test-app || {
              echo "Test app execution failed or timed out"
              echo "Checking temp directory permissions..."
              ls -la /tmp/ | grep ubuilder || echo "No ubuilder temp dirs found"
              echo "Checking current directory:"
              ls -la
            }
          else
            echo "Test app was not created"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-macos
          path: build/src/ubuilder
