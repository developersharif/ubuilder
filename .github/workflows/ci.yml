name: UBuilder Cross-Platform CI

on:
  push:
    branches: [main, develop, tests]
  pull_request:
    branches: [main, tests]
  workflow_dispatch: # Allow manual triggering

env:
  CMAKE_BUILD_TYPE: Release

permissions:
  contents: read # Required to checkout code
  actions: write # Required to upload artifacts

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: "Ubuntu Latest"
            os: ubuntu-latest
          - name: "Ubuntu 20.04"
            os: ubuntu-20.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential zlib1g-dev

      - name: Install runtime dependencies
        run: |
          sudo apt-get install -y php-cli php-dev python3 python3-dev nodejs npm
          # Verify installations
          php --version
          python3 --version
          node --version

      - name: Make build scripts executable
        run: |
          chmod +x scripts/build-all.sh
          chmod +x examples/build-examples*.sh
          chmod +x examples/build-examples.sh

      - name: Run cross-platform build system
        run: |
          ./scripts/build-all.sh

      - name: Remove runtime dependencies and test portability
        run: |
          echo "=== Using dedicated Linux portability test script ==="
          chmod +x examples/test-examples-linux-no-runtime.sh
          ./examples/test-examples-linux-no-runtime.sh

      - name: Verify build outputs
        run: |
          echo "=== Build Output Verification ==="
          ls -la build/src/
          ls -la examples/output/ || echo "No example outputs found"

          echo "=== Testing UBuilder executable ==="
          ./build/src/ubuilder --version
          ./build/src/ubuilder --help

      - name: Run unit tests
        run: |
          cd build
          if [ -f "./tests/test_ubuilder" ]; then
            echo "Running unit tests..."
            ./tests/test_ubuilder
          else
            echo "Unit tests not found, skipping..."
          fi

      - name: Run bundle integration tests
        run: |
          chmod +x tests/bundle/run-bundle-tests.sh
          tests/bundle/run-bundle-tests.sh

      # S8 (audit): build a statically-linked launcher and re-run the bundle
      # harness against it. Proves the launcher itself doesn't depend on the
      # build host's libc. The bundles still embed a dynamic interpreter
      # (M1 closes that), but the launcher gate is the first hermeticity test.
      - name: Build static launcher (S8)
        run: |
          sudo apt-get install -y musl-tools || true
          cmake -B build-static -S . \
                -DUBUILDER_STATIC=ON \
                -DENABLE_COMPRESSION=OFF \
                -DCMAKE_BUILD_TYPE=Release
          cmake --build build-static -j --target ubuilder
          file build-static/src/ubuilder
          ldd build-static/src/ubuilder 2>&1 | grep -q 'not a dynamic' \
            || (echo "::error::static launcher has dynamic deps" && ldd build-static/src/ubuilder && exit 1)

      - name: Run bundle harness against static launcher (S8)
        run: |
          UBUILDER_BIN="$(pwd)/build-static/src/ubuilder" tests/bundle/run-bundle-tests.sh

      # M1-C (audit §4.2): Tier-3 hermeticity test. Vendor hermetic Python
      # and Node interpreters, build bundles, then run them inside
      # debian:12-slim (no Python/Node installed anywhere) to prove the
      # bundles really are zero-dependency.
      - name: Vendor hermetic runtimes (M1)
        run: |
          chmod +x scripts/vendor-runtimes.sh
          scripts/vendor-runtimes.sh python node

      - name: Run Tier-3 Docker hermeticity test (M1-C)
        run: |
          chmod +x tests/bundle/run-tier3.sh
          UBUILDER_TIER3_MODE=docker tests/bundle/run-tier3.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-linux-${{ matrix.os }}
          path: |
            build/src/ubuilder
            examples/output/
          retention-days: 7
          if-no-files-found: warn
          compression-level: 6

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-linux-${{ matrix.os }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 3

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      matrix:
        shell: [powershell] # Temporarily disabled cmd due to Unicode/timeout issues
        # shell: [cmd, powershell]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v1.1

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install runtime dependencies
        shell: pwsh
        run: |
          Write-Host "Installing dependencies..." -ForegroundColor Cyan

          # Function to safely run commands
          function Invoke-SafeCommand {
            param([string]$Command, [array]$Args, [string]$Name)
            try {
              $output = & $Command @Args 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "✓ $Name installed/updated successfully" -ForegroundColor Green
              } else {
                Write-Host "⚠ $Name returned exit code $LASTEXITCODE (may already be installed)" -ForegroundColor Yellow
              }
            } catch {
              Write-Host "⚠ $Name installation failed or already installed: $_" -ForegroundColor Yellow
            }
          }

          # Install via winget with better error handling
          Invoke-SafeCommand "winget" @("install", "--id", "Microsoft.VisualStudio.2022.BuildTools", "--silent", "--accept-package-agreements", "--accept-source-agreements") "Visual Studio Build Tools"
          Invoke-SafeCommand "winget" @("install", "--id", "Kitware.CMake", "--silent", "--accept-package-agreements", "--accept-source-agreements") "CMake"  
          Invoke-SafeCommand "winget" @("install", "--id", "Python.Python.3.11", "--silent", "--accept-package-agreements", "--accept-source-agreements") "Python 3.11"
          Invoke-SafeCommand "winget" @("install", "--id", "OpenJS.NodeJS", "--silent", "--accept-package-agreements", "--accept-source-agreements") "Node.js"

          # Install PHP using Chocolatey as backup  
          Write-Host "Checking for PHP..." -ForegroundColor Cyan
          if (-not (Get-Command php -ErrorAction SilentlyContinue)) {
            Write-Host "Installing PHP via Chocolatey..." -ForegroundColor Yellow
            try {
              Set-ExecutionPolicy Bypass -Scope Process -Force
              [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
              iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
              choco install php -y --force
              Write-Host "✓ PHP installed via Chocolatey" -ForegroundColor Green
            } catch {
              Write-Host "⚠ Failed to install PHP via Chocolatey: $_" -ForegroundColor Yellow
            }
          } else {
            Write-Host "✓ PHP already available" -ForegroundColor Green
          }

          # Refresh environment
          Write-Host "Refreshing environment..." -ForegroundColor Cyan
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")

          Write-Host "Dependencies installation completed!" -ForegroundColor Green

      - name: Verify runtime installations
        shell: pwsh
        run: |
          Write-Host "=== Runtime Verification ===" -ForegroundColor Cyan

          function Test-Runtime {
            param([string]$Command, [string]$Name, [array]$VersionArgs = @("--version"))
            Write-Host "Testing $Name..." -ForegroundColor Yellow
            try {
              $version = & $Command @VersionArgs 2>&1 | Select-Object -First 1
              Write-Host "✓ $Name available: $version" -ForegroundColor Green
              return $true
            } catch {
              Write-Host "✗ $Name not found or not working" -ForegroundColor Red
              return $false
            }
          }

          $results = @{}
          $results.Python = Test-Runtime "python" "Python"
          if (-not $results.Python) {
            $results.Python = Test-Runtime "python3" "Python3"
          }
          $results.NodeJS = Test-Runtime "node" "Node.js"
          $results.PHP = Test-Runtime "php" "PHP"
          $results.CMake = Test-Runtime "cmake" "CMake"

          Write-Host "`n=== Installation Summary ===" -ForegroundColor Cyan
          $results.GetEnumerator() | ForEach-Object {
            $status = if ($_.Value) { "✓" } else { "✗" }
            $color = if ($_.Value) { "Green" } else { "Red" }
            Write-Host "$($_.Key): $status" -ForegroundColor $color
          }

          $totalSuccess = ($results.Values | Where-Object { $_ }).Count
          Write-Host "`nSuccessfully verified: $totalSuccess/4 runtimes" -ForegroundColor $(if ($totalSuccess -ge 3) { "Green" } else { "Yellow" })

      - name: Run Windows Batch Build Script
        if: matrix.shell == 'cmd'
        shell: cmd
        timeout-minutes: 45
        run: |
          echo === Running Windows Batch Build Script ===
          examples\build-examples.bat

      - name: Run Windows PowerShell Build Script
        if: matrix.shell == 'powershell'
        shell: pwsh
        timeout-minutes: 45
        run: |
          Write-Host "=== Running Windows PowerShell Build Script ===" -ForegroundColor Cyan
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          examples\build-examples.ps1 -Verbose

      - name: Remove runtime dependencies for portability test
        shell: pwsh
        run: |
          Write-Host "=== Using dedicated Windows portability test script ===" -ForegroundColor Cyan
          examples\test-examples-windows-no-runtime.bat

      - name: Verify build outputs
        shell: pwsh
        run: |
          Write-Host "=== Build Output Verification ===" -ForegroundColor Cyan

          # Check for UBuilder executable
          $ubuilderPath = $null
          if (Test-Path "build\src\Release\ubuilder.exe") {
            $ubuilderPath = "build\src\Release\ubuilder.exe"
            Write-Host "Found: $ubuilderPath" -ForegroundColor Green
          } elseif (Test-Path "build\src\ubuilder.exe") {
            $ubuilderPath = "build\src\ubuilder.exe"
            Write-Host "Found: $ubuilderPath" -ForegroundColor Green
          } else {
            Write-Host "UBuilder executable not found!" -ForegroundColor Red
            Write-Host "Searching for ubuilder files..." -ForegroundColor Yellow
            Get-ChildItem -Recurse -Name "ubuilder*" | ForEach-Object { Write-Host "  $_" }
            exit 1
          }

          # Test UBuilder executable
          Write-Host "`nTesting UBuilder executable..." -ForegroundColor Yellow
          try {
            & $ubuilderPath --version
            if ($LASTEXITCODE -eq 0) {
              Write-Host "UBuilder version check successful!" -ForegroundColor Green
            } else {
              Write-Host "UBuilder version check failed with exit code $LASTEXITCODE" -ForegroundColor Red
            }
          } catch {
            Write-Host "Failed to run UBuilder: $_" -ForegroundColor Red
          }

          # Check example outputs
          Write-Host "`n=== Example Outputs ===" -ForegroundColor Cyan
          if (Test-Path "examples\output") {
            $examples = Get-ChildItem "examples\output" -File
            if ($examples.Count -gt 0) {
              Write-Host "Found $($examples.Count) example executable(s):" -ForegroundColor Green
              $examples | ForEach-Object { Write-Host "  $_" -ForegroundColor Green }
            } else {
              Write-Host "No example executables found in examples\output" -ForegroundColor Yellow
            }
          } else {
            Write-Host "examples\output directory not found" -ForegroundColor Yellow
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-windows-${{ matrix.shell }}
          path: |
            build/src/Release/ubuilder.exe
            build/src/ubuilder.exe
            examples/output/
          retention-days: 7
          if-no-files-found: warn
          compression-level: 6

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows-${{ matrix.shell }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 3

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - name: "macOS Latest"
            os: macos-latest
          - name: "macOS 12"
            os: macos-12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew update
          brew install cmake zlib

      - name: Install runtime dependencies
        run: |
          brew install php python3 node
          # Verify installations
          php --version
          python3 --version
          node --version

      - name: Make build scripts executable
        run: |
          chmod +x scripts/build-all.sh
          chmod +x examples/build-examples*.sh

      - name: Run cross-platform build system
        run: |
          ./scripts/build-all.sh

      - name: Remove runtime dependencies and test portability
        run: |
          echo "=== Using dedicated macOS portability test script ==="
          chmod +x examples/test-examples-macos-no-runtime.sh
          ./examples/test-examples-macos-no-runtime.sh

      - name: Verify build outputs
        run: |
          echo "=== Build Output Verification ==="
          ls -la build/src/
          ls -la examples/output/ || echo "No example outputs found"

          echo "=== Testing UBuilder executable ==="
          ./build/src/ubuilder --version
          ./build/src/ubuilder --help

      - name: Run unit tests
        run: |
          cd build
          if [ -f "./tests/test_ubuilder" ]; then
            echo "Running unit tests..."
            ./tests/test_ubuilder
          else
            echo "Unit tests not found, skipping..."
          fi

      - name: Run bundle integration tests
        run: |
          chmod +x tests/bundle/run-bundle-tests.sh
          tests/bundle/run-bundle-tests.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-macos-${{ matrix.os }}
          path: |
            build/src/ubuilder
            examples/output/
          retention-days: 7
          if-no-files-found: warn
          compression-level: 6

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-macos-${{ matrix.os }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 3

  # Cross-platform integration test
  integration-test:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display build results
        run: |
          echo "=== Cross-Platform Build Results ==="
          find artifacts -name "ubuilder*" -type f
          echo ""
          echo "=== Build Summary ==="
          echo "Linux builds:"
          find artifacts -name "*linux*" -type d || echo "No Linux builds found"
          echo "Windows builds:"
          find artifacts -name "*windows*" -type d || echo "No Windows builds found"
          echo "macOS builds:"
          find artifacts -name "*macos*" -type d || echo "No macOS builds found"

          echo ""
          echo "=== Example Applications ==="
          find artifacts -name "*.exe" -o -name "nodejs" -o -name "php" -o -name "python" | grep -v "/build/" || echo "No example applications found"

  # Create release artifacts
  release:
    needs: [integration-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release package
        run: |
          mkdir -p release

          # Copy executables
          find artifacts -name "ubuilder" -type f -exec cp {} release/ubuilder-linux \;
          find artifacts -name "ubuilder.exe" -type f -exec cp {} release/ubuilder-windows.exe \;
          find artifacts -name "ubuilder" -path "*/macos*" -type f -exec cp {} release/ubuilder-macos \;

          # Copy documentation
          cp README.md release/
          cp examples/BUILD_SYSTEM.md release/
          cp LICENSE release/ 2>/dev/null || echo "LICENSE file not found"

          # Create archive
          cd release
          tar -czf ../ubuilder-cross-platform.tar.gz *

          echo "=== Release Contents ==="
          ls -la

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuilder-release
          path: |
            release/*
            ubuilder-cross-platform.tar.gz
          retention-days: 30
