name: Release UBuilder

on:
  push:
    tags:
      - 'v*.*.*'        # Semantic versioning: v1.0.0, v2.1.3, etc.
      - 'v*.*.*-*'      # Pre-release versions: v2.0.0-alpha, v1.0.0-beta, etc.
      - 'v*-*'          # Short alpha/beta: v2.0-alpha, v1.5-beta, etc.
  workflow_dispatch:  # Allow manual triggering
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  CMAKE_BUILD_TYPE: Release

permissions:
  contents: write      # Required to create releases and upload assets
  packages: write      # Required for package operations  
  actions: read        # Required to download artifacts

jobs:
  build-release:
    name: Build Release Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: ubuilder-linux-amd64
            binary_name: ubuilder
            binary_path: build/src/ubuilder
            examples_path: examples/output/*
          - os: windows-latest
            platform: windows
            artifact_name: ubuilder-windows-amd64
            binary_name: ubuilder.exe
            binary_path: build/src/Release/ubuilder.exe
            examples_path: examples/output/*.exe
          - os: macos-latest
            platform: macos
            artifact_name: ubuilder-macos-amd64
            binary_name: ubuilder
            binary_path: build/src/ubuilder
            examples_path: examples/output/*

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # Linux-specific setup
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential zlib1g-dev
          sudo apt-get install -y php-cli php-dev python3 python3-dev nodejs npm

      # Windows-specific setup
      - name: Setup Windows environment
        if: matrix.platform == 'windows'
        uses: microsoft/setup-msbuild@v1.1

      - name: Install Windows CMake
        if: matrix.platform == 'windows'
        uses: lukka/get-cmake@latest

      - name: Install Windows runtime dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Write-Host "Installing Windows runtime dependencies..." -ForegroundColor Cyan
          
          # Function to safely run commands
          function Invoke-SafeCommand {
            param([string]$Command, [array]$Args, [string]$Name)
            try {
              $output = & $Command @Args 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "✓ $Name installed/updated successfully" -ForegroundColor Green
              } else {
                Write-Host "⚠ $Name returned exit code $LASTEXITCODE (may already be installed)" -ForegroundColor Yellow
              }
            } catch {
              Write-Host "⚠ $Name installation failed or already installed: $_" -ForegroundColor Yellow
            }
          }
          
          # Try winget first (may not be available in all runners)
          if (Get-Command winget -ErrorAction SilentlyContinue) {
            Write-Host "Using winget for installations..." -ForegroundColor Cyan
            Invoke-SafeCommand "winget" @("install", "--id", "Python.Python.3.11", "--silent", "--accept-package-agreements", "--accept-source-agreements") "Python 3.11"
            Invoke-SafeCommand "winget" @("install", "--id", "OpenJS.NodeJS", "--silent", "--accept-package-agreements", "--accept-source-agreements") "Node.js"
          } else {
            Write-Host "Winget not available, using Chocolatey..." -ForegroundColor Yellow
          }
          
          # Install Chocolatey if not available
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Write-Host "Installing Chocolatey..." -ForegroundColor Yellow
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          
          # Install missing runtimes via Chocolatey
          if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
            Write-Host "Installing Python via Chocolatey..." -ForegroundColor Yellow
            choco install python --version=3.11.0 -y --force
          }
          
          if (-not (Get-Command node -ErrorAction SilentlyContinue)) {
            Write-Host "Installing Node.js via Chocolatey..." -ForegroundColor Yellow
            choco install nodejs -y --force
          }
          
          if (-not (Get-Command php -ErrorAction SilentlyContinue)) {
            Write-Host "Installing PHP via Chocolatey..." -ForegroundColor Yellow
            choco install php -y --force
          }
          
          # Refresh PATH
          Write-Host "Refreshing environment PATH..." -ForegroundColor Cyan
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")
          
          Write-Host "Dependencies installation completed!" -ForegroundColor Green

      # Verify Windows runtime installations
      - name: Verify Windows runtime installations
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Write-Host "=== Runtime Verification ===" -ForegroundColor Cyan
          
          function Test-Runtime {
            param([string]$Command, [string]$Name, [array]$VersionArgs = @("--version"))
            Write-Host "Testing $Name..." -ForegroundColor Yellow
            try {
              $version = & $Command @VersionArgs 2>&1 | Select-Object -First 1
              Write-Host "✓ $Name available: $version" -ForegroundColor Green
              return $true
            } catch {
              Write-Host "✗ $Name not found or not working" -ForegroundColor Red
              return $false
            }
          }
          
          $results = @{
            Python = $false
            NodeJS = $false
            PHP = $false
            CMake = $false
          }
          $results.Python = Test-Runtime "python" "Python"
          if (-not $results.Python) {
            $results.Python = Test-Runtime "python3" "Python3"
          }
          $results.NodeJS = Test-Runtime "node" "Node.js"
          $results.PHP = Test-Runtime "php" "PHP"
          $results.CMake = Test-Runtime "cmake" "CMake"
          
          Write-Host "`n=== Installation Summary ===" -ForegroundColor Cyan
          $results.GetEnumerator() | ForEach-Object {
            $status = if ($_.Value) { "✓" } else { "✗" }
            $color = if ($_.Value) { "Green" } else { "Red" }
            Write-Host "$($_.Key): $status" -ForegroundColor $color
          }
          
          $totalSuccess = ($results.Values | Where-Object { $_ }).Count
          Write-Host "`nSuccessfully verified: $totalSuccess/4 runtimes" -ForegroundColor $(if ($totalSuccess -ge 3) { "Green" } else { "Yellow" })

      # macOS-specific setup
      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew update
          brew install cmake zlib php python3 node

      # Build UBuilder
      - name: Build UBuilder (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          echo "Building UBuilder for ${{ matrix.platform }}"
          chmod +x build-all.sh
          ./build-all.sh

      - name: Build UBuilder (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Write-Host "Building UBuilder for Windows" -ForegroundColor Cyan
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          examples\build-examples.ps1 -Verbose

      # Verify build output
      - name: Verify build output
        shell: bash
        run: |
          echo "=== Verifying build output ==="
          if [[ -f "${{ matrix.binary_path }}" ]]; then
            echo "✓ Binary found: ${{ matrix.binary_path }}"
            ls -la "${{ matrix.binary_path }}"
          else
            echo "✗ Binary not found: ${{ matrix.binary_path }}"
            echo "Files in build directory:"
            find build -name "*ubuilder*" -type f || true
            exit 1
          fi
          
          # Test the binary
          echo "=== Testing binary ==="
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            "${{ matrix.binary_path }}" --version
          else
            ./"${{ matrix.binary_path }}" --version
          fi

      # Create release package
      - name: Create release package
        shell: bash
        run: |
          echo "=== Creating release package ==="
          mkdir -p release-package
          
          # Copy main binary
          cp "${{ matrix.binary_path }}" "release-package/${{ matrix.binary_name }}"
          
          # Copy examples if they exist
          if ls ${{ matrix.examples_path }} 1> /dev/null 2>&1; then
            mkdir -p release-package/examples
            cp ${{ matrix.examples_path }} release-package/examples/ || true
            echo "Examples copied to package"
          else
            echo "No examples found to package"
          fi
          
          # Copy documentation
          cp README.md release-package/ || true
          cp LICENSE release-package/ || true
          cp CHANGELOG.md release-package/ || true
          
          # List package contents
          echo "Package contents:"
          find release-package -type f

      # Create archive
      - name: Create archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd release-package
          tar -czf "../${{ matrix.artifact_name }}.tar.gz" .
          cd ..
          echo "Created ${{ matrix.artifact_name }}.tar.gz"

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "release-package\*" -DestinationPath "${{ matrix.artifact_name }}.zip"
          Write-Host "Created ${{ matrix.artifact_name }}.zip"

      # Upload artifacts for release
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating release for version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.tar.gz" -o -name "*.zip" | sort

      - name: Generate release notes
        id: generate_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## UBuilder ${{ steps.get_version.outputs.VERSION }}
          
          This release contains pre-built binaries for multiple platforms.
          
          ### What's Included
          - **UBuilder Core**: The main executable for creating bundled applications
          - **Example Applications**: Pre-built examples demonstrating Python, PHP, and Node.js support
          - **Documentation**: README, license, and changelog
          
          ### Platform Support
          - **Linux (x86_64)**: Ubuntu 20.04+ compatible
          - **Windows (x86_64)**: Windows 10+ compatible  
          - **macOS (x86_64)**: macOS 12+ compatible
          
          ### Quick Start
          1. Download the archive for your platform
          2. Extract the contents
          3. Run `./ubuilder --help` (Linux/macOS) or `ubuilder.exe --help` (Windows)
          4. Check the examples directory for sample applications
          
          ### Usage
          ```bash
          # Create a bundled Python application
          ./ubuilder --project-dir=./my-python-app --runtime=python --output=my-app
          
          # Create a bundled PHP application
          ./ubuilder --project-dir=./my-php-app --runtime=php --output=my-app
          
          # Create a bundled Node.js application
          ./ubuilder --project-dir=./my-node-app --runtime=node --output=my-app
          ```
          
          ---
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.get_version.outputs.VERSION }}...v${{ steps.get_version.outputs.VERSION }}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: UBuilder ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/ubuilder-linux-amd64/*.tar.gz
            artifacts/ubuilder-windows-amd64/*.zip
            artifacts/ubuilder-macos-amd64/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-release:
    name: Notify Release Complete
    needs: [build-release, create-release]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Release Status
        run: |
          if [[ "${{ needs.build-release.result }}" == "success" && "${{ needs.create-release.result }}" == "success" ]]; then
            echo "🎉 Release completed successfully!"
            echo "Binaries are now available on the GitHub Releases page."
          else
            echo "❌ Release failed. Check the logs for details."
            echo "Build result: ${{ needs.build-release.result }}"
            echo "Release result: ${{ needs.create-release.result }}"
          fi
